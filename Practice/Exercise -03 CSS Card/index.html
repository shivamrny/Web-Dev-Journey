<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Card Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: gray;
            padding: 45px;
            margin: 20px;

        }

        .outer-class {
            background-color: white;
            width: 344px;
            height: 460px;
            border-radius: 7px;
            padding: 0 0 64 0px;
        }

        .image {
            padding: 17px;
        }

        .image img {
            border-radius: 7px;
        }

        .capsules {
            padding: 0 28px 0 14px;
        }

        .capsules span {
            border-radius: 7px;
            padding: 0px 6px;
            border: 1px solid gray;
            font-size: 11px;
        }

        .content {
            padding: 7px 13px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .content p {
            font-size: 16px;
            color: gray;
        }

        .button {
            text-align: center;
        }

        .button button {
            padding: 7px 9px;
            border-radius: 9px;
            background-color: rgb(180, 206, 235);
            color: rgb(76, 132, 230);
            font-size: 12px;
            margin-top: 12px;
            border: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="outer-class">
        <div class="image">
            <img width="310px"
                src="https://static.vecteezy.com/system/resources/previews/023/788/274/large_2x/tourist-man-in-hat-relaxing-on-boat-at-the-beautiful-islands-back-view-generative-ai-photo.jpg"
                alt="A Man On A Boat">
        </div>
        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="content">
            <h2>Shivam Rauniyar </h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Eius culpa natus enim, quis ea quia quasi,
                repellendus sed reiciendis, atque hic architecto provident.</p>
        </div>
        <div class="button">
            <button>Read More</button>
        </div>
    </div>
</body>

</html>
