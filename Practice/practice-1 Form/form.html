<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Form</title>
</head>
<body>
     <h1>
        Enter The Details Required:
     </h1>
     <form action="post">
        <div>
            <label for="name">Enter Your Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter Your Name">
        <div>
            <label for="city">Enter Your City Name:</label>
            <input type="text" id="city" name="city" placeholder="Enter Your City Name">
        </div>
        <div>
            <label for="pincode">Enter your Pincode:</label>
            <input type="number" id="pincode" name="pincode" placeholder="pincode">
        </div>
        <div>
            <label for="comments">Enter Your Comment:</label>
            <span>
            <textarea name="comments" id="commrnts" rows="4" cols="54"></textarea>
            </span>
        </div>
        <div>
            <input type="submit" value="Submit Now" id="submit" name="submit">
        </div>
        </span>
     </form>
</body>
</html>
