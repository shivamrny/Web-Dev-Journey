<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> FORMS - Lets Learn It</title>
</head>

<body>
    <h1> Form To Apply For ID </h1>
    <form action="post">
        <div>
            <label for="username">Please Enter Your Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter Your Username:">
        </div>
        <br>
        <div>
            Gender:
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <br>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe For New Updates</label>
        </div>
         <br>
        <div>
            <label for="comments">Enter Your Comments Here!!</label>
            <br>
            <textarea name="comments" id="comments" rows="4" cols="50">
            </textarea>
        </div>
        <br>
        <div>
            <label for="cars">Select Your Cars Preference!!</label>
            <select name="cars" id="cars">
            <option value="porsche">Porsche</option>
            <option value="Mercedes">Mercedes</option>
            <option value="mini">Mini Cooper</option>
            <option value="kia">Kia Sonnet</option>
            </select>
        </div>
    </form>
</body>

</html>
