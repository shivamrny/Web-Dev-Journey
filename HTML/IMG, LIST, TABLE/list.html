<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISTS IN HTML</title>
</head>
<body>
    :UNORDERED LIST 
    <ul>
        <li>SHIVAM</li>
        <li>TARUN</li>
    </ul>
    <ul type="square">
        <li>SHIVAM</li>
        <li>TARUN</li>
    </ul>
    <br>
    :ORDERED LISTS
    <ol>
        <li>SHIVAM</li>
        <li>TARUN</li>
    </ol>
    <ol type="I">
        <li>SHIVAM</li>
        <li>TARUN</li>
    </ol>
</body>
</html>
